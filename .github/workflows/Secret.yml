name: Deploy Novahosting Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}

          script: |
            cd /root

            if [ ! -d "Novahosting" ]; then
              git clone https://github.com/wvwpg67xqw-hub/Novahosting.git
            fi

            cd /root/Novahosting

            git pull

            echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
            echo "DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}" >> .env
            echo "DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}" >> .env
            echo "FEATHERPANEL_URL=${{ secrets.FEATHERPANEL_URL }}" >> .env
            echo "FEATHERPANEL_API_KEY=${{ secrets.FEATHERPANEL_API_KEY }}" >> .env
            echo "STAFF_ROLE_ID=${{ secrets.STAFF_ROLE_ID }}" >> .env
            echo "LOG_CHANNEL_ID=${{ secrets.LOG_CHANNEL_ID }}" >> .env

            chmod 600 .env

            echo "Deployment complete"